<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Opener Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Template Management</h1>

    <div class="templates-section">
      <div class="section-header">
        <h2>Your Templates</h2>
        <button id="addNewBtn" class="btn btn-primary">+ Add New Template</button>
      </div>

      <div id="templatesList" class="templates-list">
        <!-- Templates will be inserted here -->
      </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="templateModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Add New Template</h3>
          <button id="closeModalBtn" class="close-btn">&times;</button>
        </div>

        <form id="templateForm" class="modal-body">
          <div class="form-group">
            <label for="templateName">Template Name:</label>
            <input
              type="text"
              id="templateName"
              placeholder="e.g., Playstore, Jira"
              required
            >
          </div>

          <div class="form-group">
            <label for="templateUrl">URL Pattern:</label>
            <textarea
              id="templateUrl"
              placeholder="Use {item} as placeholder. Example: https://play.google.com/store/apps/details?id={item}"
              rows="3"
              required
            ></textarea>
            <small>Replace the actual value with {item}</small>
          </div>

          <div class="modal-footer">
            <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Template</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmModal" class="modal hidden">
      <div class="modal-content small">
        <div class="modal-header">
          <h3>Delete Template?</h3>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to delete "<span id="deleteTemplateName"></span>"?</p>
        </div>
        <div class="modal-footer">
          <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
          <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
