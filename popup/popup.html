<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Opener</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Multi-Opener</h1>

    <div class="form-group">
      <label for="itemsInput">Items (comma-separated):</label>
      <textarea
        id="itemsInput"
        placeholder="e.g., com.instagram,com.facebook"
        rows="3"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="templateSelect">Template:</label>
      <select id="templateSelect">
        <option value="">-- Select a template --</option>
      </select>
    </div>

    <div class="button-group">
      <button id="openAllBtn" class="btn btn-primary">Open All</button>
      <button id="settingsBtn" class="btn btn-secondary">Settings</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
